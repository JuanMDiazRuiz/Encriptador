<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encriptador de Texto</title>
    <link rel="stylesheet" href="/style/style.css">
</head>
<body>
    <article class="ingreso">
        <img class="ingreso__logo" src="/img/Logo.png" alt="Logo de Alura">
        <input class="ingreso__cuadro" type="text" placeholder="Ingrese el texto aqui">
        <p class="ingreso__mensaje"> <img src="/img/bi_exclamation-circle-fill.png" alt=""> Solo letras minusculas y sin acento</p>
        <button class="ingreso__boton1">Encriptar</button>
        <button class="ingreso__boton2">Desencriptar</button>
    </article>
    <aside class="respuesta">
        <img class="respuesta__muñeco" src="/img/Muñeco.png" alt="Joven buscando con una lupa">
        <p class="respuesta__mensaje1"><b>Ningún mensaje fue <br>encontrado</b></p>
        <p class="respuesta__mensaje2">Ingresa el texto que desees encriptar o <br>desencriptar.</p>
    </aside>
</body>
</html>
