<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encriptador de Texto</title>
    <link rel="stylesheet" href="/style/style.css">
</head>
<body>
    <article class="ingreso">
        <img class="ingreso__logo" src="/img/Logo.png" alt="Logo de Alura">
        <p class="ingreso__mensaje__page2"> <img src="/img/bi_exclamation-circle-fill.png" alt=""> Solo letras minusculas y sin acento</p>
        <button class="ingreso__boton1">Encriptar</button>
        <button class="respuesta__boton">Desencriptar</button>
    </article>
    <aside class="respuesta">
        <button class="respuesta__boton3">Copiar</button>
    </aside>
</body>
</html>
